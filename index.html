<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>太平洋寿险27日启动会座位查询</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --accent: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

        body {
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%; max-width: 380px; padding: 45px 28px 85px;
            border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center; position: relative; display: none;
        }

        .card-logo { position: absolute; bottom: 25px; right: 28px; max-width: 135px; opacity: 0.95; }
        .hero-section { margin-bottom: 35px; }
        .hero-main-img { width: 85%; height: auto; margin: 0 auto 20px; display: block; }
        .hero-subtitle { color: var(--text-main); font-size: 15px; margin-bottom: 12px; font-weight: 800; display: block; line-height: 1.5; letter-spacing: 0.5px; }
        .hero-label { color: var(--primary); letter-spacing: 4px; font-size: 14px; font-weight: 700; display: block; }

        input {
            display: block; width: 100%; padding: 18px; font-size: 18px; border: 2px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px; outline: none; background: rgba(255, 255, 255, 0.8); margin-bottom: 15px; text-align: center;
        }

        button {
            display: block; width: 100%; padding: 18px; background: var(--primary); color: white;
            font-size: 20px; font-weight: 700; border: none; border-radius: 18px; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4); margin-bottom: 14px;
        }

        .welcome-msg { color: var(--text-sub); font-size: 20px; margin-bottom: 30px; }
        #resNameBold { color: var(--text-main); font-weight: 900; font-size: 30px; border-bottom: 3px solid var(--primary); }
        .seat-num { font-size: 62px; font-weight: 900; color: var(--success); display: block; }

        .btn-map { background: var(--accent); }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(15px);
            flex-direction: column;
        }

        .modal-header {
            height: 60px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; font-weight: 800; letter-spacing: 2px;
        }

        .map-viewer {
            flex: 1; width: 100%; overflow: auto;
            display: flex; align-items: center; justify-content: center;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            width: 90vh; height: 95vw;
            transform: rotate(90deg);
            object-fit: contain;
            flex-shrink: 0;
        }

        .modal-footer {
            height: 100px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(to top, black, transparent);
        }

        .close-btn {
            background: var(--error); color: white; border: none;
            padding: 12px 60px; border-radius: 30px; font-size: 16px;
            font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .error-msg { color: var(--error); font-size: 14px; margin-bottom: 15px; display: none; font-weight: 700; }
        .reset-link { margin-top: 25px; font-size: 14px; color: var(--text-sub); cursor: pointer; display: inline-block; font-weight: 600; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p style="font-weight: 600; letter-spacing: 1px;">查询中...</p>
    </div>

    <div id="signinPage" class="card fade-in" style="display: block;">
        <div class="hero-section">
            <img src="main_title.png" alt="群雄聚力" class="hero-main-img">
            <span class="hero-subtitle">太平洋寿险辽宁分公司2025-2026年度启动会</span>
            <span class="hero-label">27日启动会座位查询</span>
        </div>
        <div>
            <input type="text" id="nameInput" placeholder="请输入姓名进行查询" autocomplete="off" onfocus="hideError()">
            <div id="errorMsg" class="error-msg">未找到名单信息，请核对后输入</div>
            <button id="signinBtn" onclick="handleSignin()">查询</button>
        </div>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <div id="resultPage" class="card fade-in">
        <p class="welcome-msg"><span id="resNameBold">--</span>，您的座位在</p>
        <div style="background: rgba(16, 185, 129, 0.1); padding: 40px 15px; border-radius: 28px; margin-bottom: 35px; border: 1px solid rgba(16, 185, 129, 0.2);">
            <span class="seat-num" id="resSeat">--</span>
        </div>
        <button class="btn-map" onclick="openMap()">查看现场座次分布图</button>
        <span class="reset-link" onclick="showDirect('signinPage')">重新查询</span>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

        function showDirect(pageId) {
            document.querySelectorAll('.card').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            window.scrollTo(0,0);
        }

        function handleSignin() {
            const input = document.getElementById('nameInput');
            const name = input.value.replace(/\s+/g, "");
            const error = document.getElementById('errorMsg');
            const loader = document.getElementById('loadingOverlay');

            if (name === "") { alert("请输入姓名"); return; }
            loader.style.display = 'flex';
            setTimeout(() => {
                if (seatData[name]) {
                    document.getElementById('resNameBold').innerText = name;
                    document.getElementById('resSeat').innerText = seatData[name];
                    error.style.display = 'none';
                    showDirect('resultPage');
                } else { error.style.display = 'block'; }
                loader.style.display = 'none';
            }, 1200);
        }

        function openMap() { document.getElementById('mapModal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeMap() { document.getElementById('mapModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSignin();
        });

</html>
